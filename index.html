<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maintenance</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 min-h-screen flex items-center justify-center">

  <div class="bg-white/10 backdrop-blur-lg p-10 rounded-2xl shadow-2xl text-center max-w-lg w-full text-white">
    
    <h1 class="text-4xl font-bold mb-4">🚧 Under Maintenance</h1>
    
    <p class="text-lg mb-6">
      We're currently working on improving our website.<br/>
      We'll be back shortly!
    </p>

    <div class="animate-pulse text-5xl mb-6">⚙️</div>

    <p class="text-sm opacity-80">
      Thank you for your patience 🙏
    </p>

    <button 
      onclick="location.reload()" 
      class="mt-6 px-6 py-2 bg-white text-purple-600 font-semibold rounded-lg hover:bg-gray-200 transition"
    >
      Refresh
    </button>

  </div>

</body>
</html>
